services:
  - type: web
    name: ethara-backend
    env: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: ./backend
    envVars:
      - key: DATABASE_URL
        scope: build
      - key: ALLOWED_ORIGINS
        value: https://ethara-frontend.vercel.app
        scope: runtime

  - type: pserv
    name: ethara-db
    plan: free
    region: oregon
    ipAllowList: []
